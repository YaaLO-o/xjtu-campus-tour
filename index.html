<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="西安交通大学智慧校园导览，探索交大每一处风景，提供景点介绍、校园地图、交通指南、AI智能助手等服务。">
    <meta name="keywords" content="西安交通大学,XJTU,智慧校园,校园导览,校园地图,景点介绍">
    <title>XJTU智慧校园游</title>
    <link rel="icon" type="image/png" href="images/logo.png">

    <!-- 高德地图安全配置（必须在 API 之前） -->
    <script type="text/javascript">
        window._AMapSecurityConfig = {
            securityJsCode: "9b47b403fdb0cb0385b6cce4c6cdf2b5",
        };
    </script>

    <!-- 高德地图 JS API -->
    <script src="https://webapi.amap.com/maps?v=2.0&key=c3671efe6405aa35284c356354f6ad81&plugin=AMap.Panorama"></script>
    <script src="https://webapi.amap.com/ui/1.1/main.js"></script>

    <!-- 字体图标 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- 样式 -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <button id="myBtn" aria-label="返回顶部"><i class="fas fa-arrow-up"></i></button>

    <div class="flex">
        <!-- 导航栏 -->
        <div class="flex-container">
            <div class="logo">
                <a href="https://www.xjtu.edu.cn/" target="_blank"><img src="images/logo.png" class="logo" alt="西安交通大学"></a>
            </div>
            <ul>
                <div class="dropdown">
                    <a href="index.html" class="dropdown" style="color:#e74c3c; font-weight:600;">首页</a>
                </div>
                <div class="dropdown">
                    <a href="landmarks.html" class="dropdown">景点介绍</a>
                </div>
                <div class="dropdown">
                    <a href="activities.html" class="dropdown">全部活动</a>
                    <div class="dropdown-content">
                        <a href="activities.html">活动介绍</a>
                        <a href="activities.html">活动管理</a>
                        <a href="activities.html">活动剪影</a>
                    </div>
                </div>
                <div class="dropdown">
                    <a href="transport.html" class="dropdown">交通推荐</a>
                </div>
                <div class="dropdown">
                    <a href="https://zajdcl.xjtu.edu.cn/ucdtmas-h5/visit-index" class="dropdown" target="_blank">预约服务</a>
                    <div class="dropdown-content">
                        <a href="https://zajdcl.xjtu.edu.cn/ucdtmas-h5/visit-index" target="_blank">场馆预约</a>
                        <a href="https://zajdcl.xjtu.edu.cn/ucdtmas-h5/visit-index" target="_blank">参观申请</a>
                        <a href="https://zajdcl.xjtu.edu.cn/ucdtmas-h5/visit-index" target="_blank">服务预定</a>
                    </div>
                </div>
            </ul>
            <div class="dropdown">
                <i class="fas fa-search icon" role="button" tabindex="0" aria-label="搜索"></i>
            </div>
            <div class="dropdown">
                <i class="fas fa-user icon" role="button" tabindex="0" aria-label="用户"></i>
            </div>
            <div class="dropdown">
                <i class="fas fa-bars icon" role="button" tabindex="0" aria-label="菜单"></i>
            </div>
        </div>

        <!-- 主要内容区域 -->
        <div class="flex">
            <!-- 轮播区 -->
            <div class="flex-item1">
                <div class="flex-item">
                    <div class="runimage">
                        <img src="images/1轮播.jpg" class="main1" alt="校园风景1">
                        <img src="images/2轮播.jpg" class="main1" alt="校园风景2">
                        <img src="images/3轮播.jpg" class="main1" alt="校园风景3">
                    </div>
                    <div class="progress">
                        <div class="progress-inner"></div>
                    </div>
                </div>
                <div class="flex-item">
                    <div class="runimage">
                        <img src="images/2轮播.jpg" class="main1" alt="校园风景2">
                        <img src="images/3轮播.jpg" class="main1" alt="校园风景3">
                        <img src="images/1轮播.jpg" class="main1" alt="校园风景1">
                    </div>
                    <div class="progress">
                        <div class="progress-inner"></div>
                    </div>
                </div>
                <div class="flex-item">
                    <div class="runimage">
                        <img src="images/3轮播.jpg" class="main1" alt="校园风景3">
                        <img src="images/1轮播.jpg" class="main1" alt="校园风景1">
                        <img src="images/2轮播.jpg" class="main1" alt="校园风景2">
                    </div>
                    <div class="progress">
                        <div class="progress-inner"></div>
                    </div>
                </div>
            </div>

            <!-- 搜索横幅 -->
            <div class="flex-box1">
                <div class="flex-box2">
                    <form class="example" action="https://www.baidu.com/s" method="get" style="margin:auto;max-width:300px">
                      <input type="text" name="wd" class="search-input" placeholder="喜欢，您再来" aria-label="搜索">
                      <button type="submit"><img src="images/搜索.png" height="20px" alt="搜索"></button>
                    </form>
                </div>
                <p class="biaoyu1">JUST GO ON </p>
                <p class="biaoyu2">CRAZY</p>
            </div>

            <!-- 照片墙 -->
            <div class="flex-item3">
                <div class="photo photo1">
                    <img src="images/夏叶.jpg" alt="夏叶">
                    <div class="photo-label">夏叶</div>
                </div>
                <div class="photo photo2">
                    <img src="images/2.jpg" alt="航天模型">
                    <div class="photo-label">航天模型</div>
                </div>
                <div class="photo photo3">
                    <img src="images/梧桐大道.jpg" alt="梧桐大道">
                    <div class="photo-label">梧桐大道</div>
                </div>
                <div class="photo photo4">
                    <img src="images/4.jpg" alt="兴庆中轴线">
                    <div class="photo-label">兴庆中轴线</div>
                </div>
                <div class="photo photo5">
                    <img src="images/春樱.jpg" alt="春樱">
                    <div class="photo-label">春樱</div>
                </div>
            </div>

            <!-- 地图部分 -->
            <div class="map-section">
                <div class="map-overlay">
                    <div class="info-title">校园智慧地图</div>

                    <!-- 搜索框 -->
                    <div style="margin-bottom: 15px;">
                        <input type="text" id="search-input" placeholder="搜索景点..." aria-label="搜索景点" style="width:100%;padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;outline:none;">
                    </div>

                    <!-- 分类标签 -->
                    <div id="category-bar" class="category-bar" style="padding:10px;margin-bottom:10px;"></div>

                    <!-- 校园历史时间线 -->
                    <div id="timeline-panel" class="timeline-panel">
                        <div class="timeline-title"><i class="fas fa-history"></i> 校园历史</div>
                        <div class="timeline-track" id="timeline-track"></div>
                    </div>

                    <!-- 天气信息面板 -->
                    <div class="weather-panel" id="weather-panel">
                        <div class="weather-header">
                            <div class="weather-title">交大校园天气</div>
                            <button class="weather-refresh" id="refresh-weather">
                                <i class="fas fa-sync-alt"></i>
                            </button>
                        </div>
                        <div class="weather-current">
                            <div class="weather-icon" id="weather-icon">
                                <i class="fas fa-sun"></i>
                            </div>
                            <div class="weather-temp" id="weather-temp">24°</div>
                            <div class="weather-details">
                                <div class="weather-desc" id="weather-desc">晴朗</div>
                                <div class="weather-info">
                                    <div class="weather-info-item">
                                        <i class="fas fa-wind"></i>
                                        <span id="weather-wind">东南风 3级</span>
                                    </div>
                                    <div class="weather-info-item">
                                        <i class="fas fa-tint"></i>
                                        <span id="weather-humidity">湿度 45%</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="weather-forecast" id="weather-forecast"></div>
                    </div>

                    <div class="map-controls">
                        <button class="map-btn" id="lock-bounds">
                            <i class="fas fa-lock"></i> 锁定地图范围
                        </button>
                        <button class="map-btn" id="unlock-bounds">
                            <i class="fas fa-unlock"></i> 取消锁定
                        </button>
                    </div>
                    <div class="search-results" id="search-results"></div>
                </div>
                <div id="container">
                    <noscript>
                        <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;background:#f5f5f5;color:#666;padding:40px;">
                            <i class="fas fa-map-marked-alt" style="font-size:48px;margin-bottom:15px;opacity:0.5;"></i>
                            <p style="font-size:16px;margin-bottom:8px;">请启用 JavaScript 以使用地图功能</p>
                            <p style="font-size:13px;opacity:0.7;">本应用需要 JavaScript 才能正常运行</p>
                        </div>
                    </noscript>
                </div>
            </div>

            <!-- 页脚 -->
            <div class="footer">
                <div class="p5">© 2026 XJTU 智慧校园游</div>
            </div>
        </div>
    </div>

    <!-- Coze AI 助手按钮 -->
    <div id="coze-assistant-btn">
        <i class="fas fa-robot"></i>
        <div class="coze-assistant-label">校园智能助手</div>
    </div>

    <!-- 配置文件（包含 API 密钥，已加入 .gitignore） -->
    <script src="config.js"></script>

    <!-- 景点数据 -->
    <script src="data/landmarks.js"></script>

    <!-- 功能模块 -->
    <script src="js/map.js"></script>
    <script src="js/app.js"></script>

    <!-- Coze AI SDK -->
    <script src="https://lf-cdn.coze.cn/obj/unpkg/flow-platform/chat-app-sdk/1.2.0-beta.8/libs/cn/index.js"></script>
    <script src="js/chat.js"></script>
</body>
</html>
